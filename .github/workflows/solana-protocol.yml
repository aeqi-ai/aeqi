name: Solana Protocol

on:
  push:
    branches: [main]
    paths:
      - "projects/aeqi-solana/**"
      - ".github/workflows/solana-protocol.yml"
  pull_request:
    branches: [main]
    paths:
      - "projects/aeqi-solana/**"
      - ".github/workflows/solana-protocol.yml"

jobs:
  verify:
    name: Verify Solana protocol
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/aeqi-solana
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: projects/aeqi-solana/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify protocol
        run: npm run verify:ci
